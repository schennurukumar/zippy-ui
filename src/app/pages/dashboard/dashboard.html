<div style="padding: 20px;">
  <h2>Available Tasks</h2>

  @for (task of tasks; track task) {
    <div class="task-card">
      <h3>{{task.title}}</h3>
      <p>📍 {{task.location}}</p>
      <p>💰 ${{task.price}}</p>

<button class="primary" (click)="acceptTask(task)">
  Accept Task
</button>
    </div>
  }
</div>
